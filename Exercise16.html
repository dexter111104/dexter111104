<!DOCTYPE html>
<html>
<head>
    <title>Exercise16</title>
    <style>
        h1.one {
            border-color:red;
            background-color: lightblue;
            border-style: double;
            border-width: 10px;
        }

        h1.two {
            border-color: blue;
            background-color: yellow;
            border-style: solid;
            border-radius: 10px;
            border-width: 5px;
        }

        h1.three {
            border-color: gray;
            background-color: lightgreen;
            border-style: dotted;
            border-width: thick;
        }
    </style>
</head>
<body>
    <h1 class="one">Hello World</h1>
    <h1 class="two">Hello World</h1>
    <h1 class="three">Hello World</h1>
</body>
</html>
